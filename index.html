<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDO Envanter Analizörü v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .item-card { border: 1px solid #334155; transition: all 0.2s; }
        .item-card:hover { transform: translateY(-2px); border-color: #6366f1; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-bold text-indigo-400 mb-2">BDO Envanter & Üretim</h1>
            <p class="text-slate-400">Resmi yükle, malzemeleri ID ve ikonlarıyla gör.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-slate-800 p-6 rounded-xl shadow-xl">
                <h2 class="text-xl font-semibold mb-4">1. Envanter Resmi Yükle</h2>
                <input type="file" id="imageInput" class="block w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-600 file:text-white hover:file:bg-indigo-700 cursor-pointer">
                <button onclick="analyzeInventory()" id="btnAnalyze" class="mt-6 w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg disabled:opacity-50">
                    Analizi Başlat
                </button>
                <div id="status" class="mt-4 text-sm text-center text-slate-400"></div>
            </div>

            <div class="bg-slate-800 p-6 rounded-xl shadow-xl">
                <h2 class="text-xl font-semibold mb-4">2. Tespit Edilen Malzemeler</h2>
                <div id="inventoryList" class="grid grid-cols-2 gap-4 max-h-[500px] overflow-y-auto pr-2">
                    </div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "BURAYA_CLAUDE_API_KEY_GELECEK"; // API Key'ini buraya yaz

        async function analyzeInventory() {
            const fileInput = document.getElementById('imageInput');
            const status = document.getElementById('status');
            const btn = document.getElementById('btnAnalyze');
            const list = document.getElementById('inventoryList');

            if (!fileInput.files[0]) return alert("Önce resim seç!");

            status.textContent = "Veri tabanı ve resim işleniyor...";
            btn.disabled = true;
            list.innerHTML = "";

            try {
                // 1. Veri tabanını yükle
                const dbResponse = await fetch('bdo_items.json');
                const dbData = await dbResponse.json();
                const itemDb = dbData.id_to_info;

                // 2. Resmi Base64 yap
                const reader = new FileReader();
                reader.readAsDataURL(fileInput.files[0]);
                reader.onload = async () => {
                    const base64Image = reader.result.split(',')[1];

                    // 3. Claude'a gönder
                    const response = await fetch('https://api.anthropic.com/v1/messages', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'x-api-key': API_KEY,
                            'anthropic-version': '2023-06-01',
                            'dangerously-allow-browser': 'true'
                        },
                        body: JSON.stringify({
                            model: "claude-3-5-sonnet-20240620",
                            max_tokens: 1000,
                            messages: [{
                                role: "user",
                                content: [
                                    { type: "image", source: { type: "base64", media_type: "image/png", data: base64Image } },
                                    { type: "text", text: "Bu bir BDO envanteri. Sadece malzemelerin İNGİLİZCE isimlerini ve miktarlarını JSON formatında döndür. Örn: [{\"name\": \"Potato\", \"count\": 415000}]" }
                                ]
                            }]
                        })
                    });

                    const result = await response.json();
                    const aiText = result.content[0].text;
                    const cleanJson = JSON.parse(aiText.substring(aiText.indexOf('['), aiText.lastIndexOf(']') + 1));

                    // 4. Eşleştirme ve Ekrana Basma
                    cleanJson.forEach(aiItem => {
                        // Veri tabanında isme göre ara
                        const foundEntry = Object.entries(itemDb).find(([id, info]) => 
                            info.name_en.toLowerCase() === aiItem.name.toLowerCase()
                        );

                        const itemDiv = document.createElement('div');
                        itemDiv.className = "item-card bg-slate-700 p-3 rounded-lg flex items-center gap-3";
                        
                        const iconUrl = foundEntry ? `https://bdocodex.com${foundEntry[1].icon}` : 'https://via.placeholder.com/40';
                        const trName = foundEntry ? foundEntry[1].name_tr : aiItem.name;
                        const itemId = foundEntry ? foundEntry[0] : '???';

                        itemDiv.innerHTML = `
                            <img src="${iconUrl}" class="w-10 h-10 rounded shadow-sm">
                            <div>
                                <div class="text-xs text-indigo-300">ID: ${itemId}</div>
                                <div class="font-bold text-sm">${trName}</div>
                                <div class="text-xs text-slate-300">${aiItem.count.toLocaleString()} Adet</div>
                            </div>
                        `;
                        list.appendChild(itemDiv);
                    });

                    status.textContent = "Analiz Tamamlandı!";
                    btn.disabled = false;
                };
            } catch (err) {
                console.error(err);
                status.textContent = "Hata oluştu! Console'a bak.";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
