<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>BDO Depo Analiz Sistemi</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Crimson+Pro:wght@400;600&display=swap');
  :root { --gold: #c9a84c; --bg: #0a0806; --panel: #12100c; --text: #d4c9a8; --border: #3d3020; }
  body { background: var(--bg); color: var(--text); font-family: 'Crimson Pro', serif; margin: 0; padding: 20px; }
  .container { max-width: 1000px; margin: 0 auto; }
  header { text-align: center; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 30px; }
  h1 { font-family: 'Cinzel', serif; color: var(--gold); margin: 0; }
  .upload-area { border: 2px dashed var(--border); padding: 40px; text-align: center; background: var(--panel); cursor: pointer; border-radius: 8px; }
  .main-content { display: none; grid-template-columns: 320px 1fr; gap: 25px; margin-top: 20px; }
  .active { display: grid; }
  .item-card { background: #1a1610; border: 1px solid #2e2618; padding: 12px; display: flex; align-items: center; gap: 15px; margin-bottom: 8px; border-left: 4px solid var(--gold); }
  .item-icon { width: 44px; height: 44px; border: 1px solid var(--border); background: #000; }
  .btn { background: linear-gradient(to bottom, var(--gold), #8a6a1e); color: #000; border: none; padding: 14px; cursor: pointer; font-family: 'Cinzel'; font-weight: bold; width: 100%; text-transform: uppercase; margin-top: 10px; }
  #loading { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; color: var(--gold); font-family: 'Cinzel'; font-size: 1.2rem; }
</style>
</head>
<body>

<div class="container">
  <header><h1>BDO STORAGE ANALYZER</h1></header>
  
  <div class="upload-area" id="drop-zone">
    <h3>📦 DEPO GÖRSELİNİ BURAYA BIRAKIN VEYA TIKLAYIN</h3>
  </div>

  <div class="main-content" id="layout">
    <div id="sidebar">
      <img id="preview" style="width:100%; border: 1px solid var(--gold);">
      <button class="btn" id="analyze-btn">⚔ ANALİZİ BAŞLAT</button>
      <button class="btn" style="background:#222; color:#888;" onclick="location.reload()">↩ YENİ GÖRSEL</button>
    </div>
    <div id="results-panel">
      <h3 style="font-family:'Cinzel'; color:var(--gold); border-bottom: 1px solid var(--border); padding-bottom: 5px;">BULUNAN EŞYALAR</h3>
      <div id="items-list"></div>
    </div>
  </div>
</div>

<div id="loading">KARA RUH ANALİZ EDİYOR...</div>

<script>
const WORKER_URL = 'https://bdo-api-proxy.onurcilhoroz.workers.dev/'; 
let ITEM_DB = null;

// bdo_items.json yükle
fetch('bdo_items.json').then(r => r.json()).then(data => ITEM_DB = data);

const fileInput = document.createElement('input'); 
fileInput.type = 'file';
document.getElementById('drop-zone').onclick = () => fileInput.click();

fileInput.onchange = (e) => {
  const reader = new FileReader();
  reader.onload = (ev) => {
    document.getElementById('preview').src = ev.target.result;
    document.getElementById('layout').classList.add('active');
    document.getElementById('drop-zone').style.display = 'none';
  };
  reader.readAsDataURL(e.target.files[0]);
};

// ANALİZ BUTONU FONKSİYONU
document.getElementById('analyze-btn').onclick = async () => {
  const imgBase64 = document.getElementById('preview').src.split(',')[1];
  document.getElementById('loading').style.display = 'flex';
  const listDiv = document.getElementById('items-list');
  listDiv.innerHTML = "";

  try {
    const response = await fetch(WORKER_URL, {
      method: 'POST',
      body: JSON.stringify({ image: imgBase64 })
    });
    
    const result = await response.json();
    if (result.error) throw new Error(result.error);

    // Yanıtın içindeki JSON listesini bul
    const items = JSON.parse(result.text.match(/\[.*\]/s)[0]);

    items.forEach(item => {
      const entry = ITEM_DB ? Object.entries(ITEM_DB.id_to_info).find(([id, info]) => 
        info.name_en.toLowerCase() === item.name.toLowerCase()
      ) : null;

      const card = document.createElement('div');
      card.className = 'item-card';
      const icon = entry ? `https://bdocodex.com${entry[1].icon}` : 'https://bdocodex.com/items/new_icon/03_etc/00007001.png';
      
      card.innerHTML = `
        <img src="${icon}" class="item-icon">
        <div>
          <div style="font-weight:bold; color:#fff;">${entry ? (entry[1].name_tr || entry[1].name_en) : item.name}</div>
          <div style="color:var(--gold); font-family:'Cinzel';">${item.count.toLocaleString()} ADET</div>
        </div>
      `;
      listDiv.appendChild(card);
    });
  } catch (err) {
    alert("HATA: " + err.message);
  } finally {
    document.getElementById('loading').style.display = 'none';
  }
};
</script>
</body>
</html>
