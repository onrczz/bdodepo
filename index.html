<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BDO Depo Analizi</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&display=swap');

  :root {
    --gold: #c9a84c; --gold-light: #e8c97a; --gold-dark: #8a6a1e;
    --bg-deep: #0a0806; --bg-panel: #12100c; --bg-card: #1a1610; --border: #2e2618;
    --border-gold: #3d3020; --text: #d4c9a8; --text-bright: #f0e6c8;
  }

  body { background: var(--bg-deep); color: var(--text); font-family: 'Crimson Pro', serif; min-height: 100vh; margin: 0; }
  .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }

  header { text-align: center; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border-gold); margin-bottom: 2rem; }
  h1 { font-family: 'Cinzel', serif; font-size: 2.2rem; color: var(--gold); letter-spacing: 0.1em; margin: 0; }
  .subtitle { color: #7a6e58; font-size: 1rem; font-style: italic; }

  .upload-zone { border: 2px dashed var(--border-gold); padding: 3rem; text-align: center; cursor: pointer; background: var(--bg-panel); transition: 0.3s; }
  .upload-zone:hover { border-color: var(--gold); background: var(--bg-card); }
  #file-input { display: none; }

  .preview-section { display: none; gap: 1.5rem; margin-top: 1.5rem; }
  .preview-section.visible { display: grid; grid-template-columns: 320px 1fr; }
  
  .ai-panel { background: var(--bg-panel); border: 1px solid var(--border-gold); padding: 1.5rem; border-radius: 4px; }
  .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin-top: 15px; max-height: 600px; overflow-y: auto; padding-right: 5px; }

  .item-card { 
    background: var(--bg-card); border: 1px solid var(--border); padding: 8px; 
    display: flex; align-items: center; gap: 12px; border-left: 3px solid var(--gold);
  }
  .item-icon { width: 44px; height: 44px; border: 1px solid #3d3020; background: #000; flex-shrink: 0; }
  .item-info { display: flex; flex-direction: column; }
  .item-name { color: var(--text-bright); font-weight: 600; font-size: 0.9rem; line-height: 1.2; }
  .item-qty { color: var(--gold); font-size: 0.85rem; font-family: 'Cinzel', serif; }

  .btn { font-family: 'Cinzel', serif; padding: 10px 20px; cursor: pointer; border: none; text-transform: uppercase; width: 100%; transition: 0.2s; }
  .btn-primary { background: linear-gradient(to bottom, var(--gold), var(--gold-dark)); color: #000; font-weight: bold; }
  .btn-primary:hover:not(:disabled) { filter: brightness(1.2); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  #loading-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; flex-direction: column; color: var(--gold); font-family: 'Cinzel'; }
  
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-thumb { background: var(--gold-dark); }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>BDO STORAGE ANALYZER</h1>
    <p class="subtitle">Depo analiz sistemi</p>
  </header>

  <div class="upload-zone" id="upload-zone">
    <span style="font-size: 3rem;">📜</span>
    <h2>Envanter Görseli Yükle</h2>
    <p>Tıkla veya sürükle bırak</p>
    <input type="file" id="file-input" accept="image/*">
  </div>

  <div class="preview-section" id="preview-section">
    <div style="display:flex; flex-direction:column; gap:10px;">
        <div class="preview-card" style="border: 1px solid var(--border-gold); padding: 5px; background: var(--bg-panel);">
            <img id="preview-img" src="" style="width:100%; border: 1px solid var(--border);">
        </div>
        <button class="btn btn-primary" id="analyze-btn">⚔ ANALİZİ BAŞLAT</button>
        <button class="btn" style="background:#222; color:#888; font-size:0.7rem;" onclick="location.reload()">↩ YENİ RESİM</button>
    </div>

    <div class="ai-panel">
      <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid var(--border-gold); padding-bottom: 10px;">
          <h3 style="font-family:'Cinzel'; color:var(--gold); margin:0;">TESPİT EDİLEN MATERYALLER</h3>
          <span id="item-count-badge" style="font-size:0.8rem; background:var(--gold-dark); color:white; padding:2px 8px; border-radius:10px;">0 Eşya</span>
      </div>
      <div class="items-grid" id="items-grid"></div>
    </div>
  </div>
</div>

<div id="loading-overlay">
  <p id="loading-status" style="letter-spacing:2px;">KARA RUH ANALİZ EDİYOR...</p>
</div>

<script>
// --- AYARLAR ---
const WORKER_URL = 'https://bdo-api-proxy.onurcilhoroz.workers.dev/'; 
let ITEM_DATABASE = null;

// Sayfa açılırken veritabanını yükle
async function init() {
    try {
        const r = await fetch('bdo_items.json');
        ITEM_DATABASE = await r.json();
        console.log("Veritabanı yüklendi.");
    } catch (e) {
        console.error("JSON dosyası bulunamadı! bdo_items.json dosyasının aynı klasörde olduğundan emin olun.");
    }
}
init();

const fileInput = document.getElementById('file-input');
const uploadZone = document.getElementById('upload-zone');
const itemsGrid = document.getElementById('items-grid');
const analyzeBtn = document.getElementById('analyze-btn');

uploadZone.onclick = () => fileInput.click();

fileInput.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
        document.getElementById('preview-img').src = ev.target.result;
        document.getElementById('preview-section').classList.add('visible');
        uploadZone.style.display = 'none';
    };
    reader.readAsDataURL(file);
};

analyzeBtn.onclick = async () => {
    const imgElement = document.getElementById('preview-img');
    if (!imgElement.src) return;

    const imgData = imgElement.src.split(',')[1];
    document.getElementById('loading-overlay').style.display = 'flex';
    analyzeBtn.disabled = true;
    itemsGrid.innerHTML = "";

    try {
        const response = await fetch(WORKER_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ image: imgData })
        });

        const result = await response.json();
        
        // Hata Kontrolü: result.content dizisi var mı?
        if (!result.content || !result.content[0]) {
            throw new Error("API'den geçersiz yanıt geldi. Worker kodunuzu kontrol edin.");
        }

        const text = result.content[0].text;
        const jsonMatch = text.match(/\[.*\]/s);
        
        if (!jsonMatch) throw new Error("Yapay zeka liste oluşturamadı.");
        
        const aiItems = JSON.parse(jsonMatch[0]);
        document.getElementById('item-count-badge').textContent = aiItems.length + " Eşya";

        aiItems.forEach(item => {
            // Veritabanında eşleştirme
            const entry = (ITEM_DATABASE && ITEM_DATABASE.id_to_info) ? 
                Object.entries(ITEM_DATABASE.id_to_info).find(([id, info]) => 
                    info.name_en.toLowerCase() === item.name.toLowerCase()
                ) : null;

            const card = document.createElement('div');
            card.className = "item-card";

            const iconPath = entry ? `https://bdocodex.com${entry[1].icon}` : 'https://bdocodex.com/items/new_icon/03_etc/00007001.png';
            const displayName = entry ? (entry[1].name_tr || entry[1].name_en) : item.name;

            card.innerHTML = `
                <img src="${iconPath}" class="item-icon" onerror="this.src='https://via.placeholder.com/44?text=?'">
                <div class="item-info">
                    <span class="item-name">${displayName}</span>
                    <span class="item-qty">${item.count.toLocaleString()} adet</span>
                </div>
            `;
            itemsGrid.appendChild(card);
        });

    } catch (err) {
        console.error("Hata Detayı:", err);
        alert("Hata: " + err.message);
    } finally {
        document.getElementById('loading-overlay').style.display = 'none';
        analyzeBtn.disabled = false;
    }
};
</script>
</body>
</html>
