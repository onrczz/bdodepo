<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>BDO Depo Analizi</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Pro&display=swap');
  :root { --gold: #c9a84c; --bg: #0a0806; --panel: #12100c; --text: #d4c9a8; }
  body { background: var(--bg); color: var(--text); font-family: 'Crimson Pro', serif; margin: 0; padding: 20px; }
  .container { max-width: 1000px; margin: 0 auto; text-align: center; }
  h1 { font-family: 'Cinzel', serif; color: var(--gold); }
  .upload-zone { border: 2px dashed #3d3020; padding: 40px; cursor: pointer; background: var(--panel); margin-bottom: 20px; }
  .preview-section { display: none; grid-template-columns: 300px 1fr; gap: 20px; text-align: left; }
  .visible { display: grid; }
  .item-card { background: #1a1610; border: 1px solid #2e2618; padding: 10px; display: flex; align-items: center; gap: 15px; margin-bottom: 10px; border-left: 3px solid var(--gold); }
  .item-icon { width: 44px; height: 44px; background: #000; border: 1px solid #3d3020; }
  .btn { background: var(--gold); color: #000; border: none; padding: 10px 20px; cursor: pointer; font-family: 'Cinzel'; font-weight: bold; width: 100%; }
  #loading { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; color: var(--gold); flex-direction: column; }
</style>
</head>
<body>

<div class="container">
  <h1>BDO STORAGE ANALYZER</h1>
  
  <div class="upload-zone" id="drop-zone">
    <p>Depo görselini buraya sürükle veya tıkla</p>
    <input type="file" id="file-input" hidden accept="image/*">
  </div>

  <div class="preview-section" id="preview-wrap">
    <div>
      <img id="img-preview" style="width:100%; border: 1px solid var(--gold);">
      <button class="btn" id="run-btn" style="margin-top:10px;">⚔ ANALİZ ET</button>
    </div>
    <div id="results-list">
      <h3 style="color:var(--gold); font-family:'Cinzel'; border-bottom:1px solid #3d3020; padding-bottom:5px;">BULUNAN MATERYALLER</h3>
      <div id="items-container"></div>
    </div>
  </div>
</div>

<div id="loading"><div>Analiz Ediliyor...</div></div>

<script>
const WORKER_URL = 'https://bdo-api-proxy.onurcilhoroz.workers.dev/';
let DB = null;

// JSON Veritabanını Yükle
fetch('bdo_items.json').then(r => r.json()).then(data => { DB = data; console.log("DB Hazır"); });

const fileInput = document.getElementById('file-input');
const dropZone = document.getElementById('drop-zone');

dropZone.onclick = () => fileInput.click();
fileInput.onchange = (e) => {
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = (ev) => {
    document.getElementById('img-preview').src = ev.target.result;
    document.getElementById('preview-wrap').classList.add('visible');
    dropZone.style.display = 'none';
  };
  reader.readAsDataURL(file);
};

document.getElementById('run-btn').onclick = async () => {
  const imgData = document.getElementById('img-preview').src.split(',')[1];
  document.getElementById('loading').style.display = 'flex';
  const container = document.getElementById('items-container');
  container.innerHTML = "";

  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      body: JSON.stringify({ image: imgData })
    });
    const data = await res.json();

    if (!data.text) throw new Error("Yapay zeka yanıtı boş döndü.");

    const jsonMatch = data.text.match(/\[.*\]/s);
    if (!jsonMatch) throw new Error("Liste formatı bulunamadı.");
    
    const items = JSON.parse(jsonMatch[0]);

    items.forEach(item => {
      const entry = DB ? Object.entries(DB.id_to_info).find(([id, info]) => info.name_en.toLowerCase() === item.name.toLowerCase()) : null;
      
      const div = document.createElement('div');
      div.className = 'item-card';
      const icon = entry ? `https://bdocodex.com${entry[1].icon}` : 'https://bdocodex.com/items/new_icon/03_etc/00007001.png';
      const name = entry ? entry[1].name_tr : item.name;

      div.innerHTML = `
        <img src="${icon}" class="item-icon">
        <div>
          <div style="font-weight:bold; color:#fff;">${name}</div>
          <div style="color:var(--gold); font-size:0.9rem;">${item.count.toLocaleString()} Adet</div>
        </div>
      `;
      container.appendChild(div);
    });
  } catch (err) {
    alert("Hata: " + err.message);
  } finally {
    document.getElementById('loading').style.display = 'none';
  }
};
</script>
</body>
</html>
