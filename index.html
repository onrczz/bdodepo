<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BDO Depo Analizi</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&display=swap');

  /* ── DARK MODE (default) ── */
  :root {
    --gold: #c9a84c; --gold-light: #e8c97a; --gold-dark: #8a6a1e;
    --bg-deep: #0a0806; --bg-panel: #12100c; --bg-card: #1a1610; --bg-hover: #221e16;
    --border: #2e2618; --border-gold: #3d3020;
    --text: #d4c9a8; --text-dim: #7a6e58; --text-bright: #f0e6c8;
    --green: #4caf76; --red: #c95c4c;
    --shadow: rgba(0,0,0,0.4);
  }

  /* ── LIGHT MODE ── */
  body.light {
    --gold: #8a5e10; --gold-light: #6b4a0e; --gold-dark: #c9a84c;
    --bg-deep: #f5f0e8; --bg-panel: #fffdf7; --bg-card: #f0ebe0; --bg-hover: #e8e0d0;
    --border: #d8cdb8; --border-gold: #c9a84c;
    --text: #3a2e1a; --text-dim: #8a7a5a; --text-bright: #2a1e08;
    --green: #2d7a4f; --red: #b03020;
    --shadow: rgba(0,0,0,0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg-deep); color: var(--text); font-family: 'Crimson Pro', serif; min-height: 100vh; transition: background 0.3s, color 0.3s; }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at 20% 20%, rgba(201,168,76,0.04) 0%, transparent 50%), radial-gradient(ellipse at 80% 80%, rgba(76,138,201,0.03) 0%, transparent 50%); pointer-events: none; z-index: 0; }
  .container { max-width: 1100px; margin: 0 auto; padding: 2rem; position: relative; z-index: 1; }

  /* ── HEADER ── */
  header { text-align: center; padding: 2rem 0 1.5rem; border-bottom: 1px solid var(--border-gold); margin-bottom: 2rem; }
  .logo-line { display: flex; align-items: center; justify-content: center; gap: 1rem; margin-bottom: 0.4rem; }
  h1 { font-family: 'Cinzel', serif; font-size: 2rem; color: var(--gold); letter-spacing: 0.1em; }
  .subtitle { color: var(--text-dim); font-size: 1rem; font-style: italic; margin-bottom: 1rem; }

  .header-controls { display: flex; gap: 0.5rem; justify-content: center; align-items: center; margin-top: 0.8rem; flex-wrap: wrap; }

  .lang-btn, .theme-btn {
    font-family: 'Cinzel', serif; font-size: 0.75rem; letter-spacing: 0.06em;
    padding: 0.4rem 1rem; border-radius: 2px; border: 1px solid var(--border-gold);
    background: transparent; color: var(--text-dim); cursor: pointer; transition: all 0.2s;
  }
  .lang-btn:hover, .theme-btn:hover { border-color: var(--gold); color: var(--gold); }
  .lang-btn.active { background: var(--gold-dark); border-color: var(--gold); color: var(--gold-light); }
  .theme-btn { padding: 0.4rem 0.8rem; font-size: 0.85rem; }

  .divider-btn { width: 1px; height: 20px; background: var(--border-gold); margin: 0 0.2rem; }

  /* ── UPLOAD ── */
  .upload-zone { border: 2px dashed var(--border-gold); border-radius: 4px; padding: 3rem 2rem; text-align: center; cursor: pointer; transition: all 0.3s; background: var(--bg-panel); }
  .upload-zone:hover, .upload-zone.drag-over { border-color: var(--gold); background: var(--bg-card); }
  .upload-icon { font-size: 3rem; display: block; margin-bottom: 1rem; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
  .upload-zone h2 { font-family: 'Cinzel', serif; color: var(--gold); font-size: 1.2rem; margin-bottom: 0.5rem; }
  .upload-zone p { color: var(--text-dim); }
  #file-input { display: none; }

  /* ── PREVIEW ── */
  .preview-section { display: none; gap: 1.5rem; margin-top: 1.5rem; }
  .preview-section.visible { display: grid; grid-template-columns: 300px 1fr; }
  .preview-card { background: var(--bg-panel); border: 1px solid var(--border-gold); border-radius: 4px; overflow: hidden; }
  .preview-card img { width: 100%; height: 200px; object-fit: cover; display: block; }
  .card-footer { padding: 0.8rem 1rem; border-top: 1px solid var(--border); display: flex; gap: 0.8rem; }

  .btn { font-family: 'Cinzel', serif; font-size: 0.8rem; letter-spacing: 0.08em; padding: 0.6rem 1.2rem; border-radius: 2px; border: none; cursor: pointer; transition: all 0.2s; text-transform: uppercase; }
  .btn-primary { background: linear-gradient(135deg, var(--gold-dark), var(--gold)); color: #fff; font-weight: 700; flex: 1; }
  body.light .btn-primary { color: #0a0806; }
  .btn-primary:hover:not(:disabled) { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary { background: transparent; border: 1px solid var(--border-gold); color: var(--text-dim); }
  .btn-secondary:hover { border-color: var(--gold); color: var(--gold); }

  /* ── STATUS PANEL ── */
  .ai-panel { background: var(--bg-panel); border: 1px solid var(--border-gold); border-radius: 4px; padding: 1.2rem 1.5rem; display: flex; flex-direction: column; gap: 0.8rem; }
  .ai-panel-title { font-family: 'Cinzel', serif; color: var(--gold); font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; display: flex; align-items: center; gap: 0.6rem; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-dim); flex-shrink: 0; transition: background 0.3s; }
  .status-dot.reading { background: var(--gold); animation: pulse 1s infinite; }
  .status-dot.done { background: var(--green); }
  .status-dot.error { background: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .ai-status-text { color: var(--text-dim); font-size: 0.95rem; font-style: italic; }

  .items-grid { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; max-height: 180px; overflow-y: auto; }
  .item-tag { background: var(--bg-card); border: 1px solid var(--border); border-radius: 2px; padding: 0.3rem 0.7rem; font-size: 0.85rem; color: var(--text); display: flex; align-items: center; gap: 0.4rem; }
  .item-tag .qty { color: var(--gold); font-weight: 600; font-size: 0.8rem; }

  /* ── RESULTS ── */
  #results-section { margin-top: 2.5rem; display: none; }
  #results-section.visible { display: block; }
  .results-header { font-family: 'Cinzel', serif; color: var(--gold); font-size: 1.1rem; letter-spacing: 0.08em; margin-bottom: 1.5rem; padding-bottom: 0.8rem; border-bottom: 1px solid var(--border-gold); }

  .results-tabs { display: flex; margin-bottom: 1.5rem; border: 1px solid var(--border-gold); border-radius: 3px; overflow: hidden; width: fit-content; }
  .tab { font-family: 'Cinzel', serif; font-size: 0.75rem; letter-spacing: 0.08em; padding: 0.6rem 1.5rem; cursor: pointer; background: var(--bg-panel); color: var(--text-dim); border: none; text-transform: uppercase; transition: all 0.2s; border-right: 1px solid var(--border-gold); }
  .tab:last-child { border-right: none; }
  .tab.active { background: var(--gold-dark); color: var(--gold-light); }
  body.light .tab.active { color: #fff; }
  .tab:hover:not(.active) { background: var(--bg-hover); color: var(--text); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ── RECIPE CARDS ── */
  .recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1rem; }
  .recipe-card { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; transition: all 0.25s; position: relative; box-shadow: 0 2px 8px var(--shadow); }
  .recipe-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); opacity: 0; transition: opacity 0.3s; }
  .recipe-card:hover { border-color: var(--border-gold); transform: translateY(-2px); box-shadow: 0 4px 16px var(--shadow); }
  .recipe-card:hover::before { opacity: 1; }

  .recipe-card-header { padding: 0.8rem 1rem; display: flex; align-items: center; gap: 0.8rem; border-bottom: 1px solid var(--border); }
  .recipe-icon { width: 36px; height: 36px; border-radius: 3px; border: 1px solid var(--border); flex-shrink: 0; }
  .recipe-name { font-family: 'Cinzel', serif; font-size: 0.85rem; color: var(--text-bright); line-height: 1.4; flex: 1; }
  .craft-badge { font-size: 0.75rem; font-weight: 600; padding: 0.2rem 0.5rem; border-radius: 2px; white-space: nowrap; flex-shrink: 0; }
  .craft-yes { background: rgba(76,175,118,0.15); color: var(--green); border: 1px solid rgba(76,175,118,0.3); }
  .craft-no { background: rgba(201,92,76,0.12); color: var(--red); border: 1px solid rgba(201,92,76,0.25); }

  .recipe-card-body { padding: 0.8rem 1rem; }
  .skill-level { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dim); margin-bottom: 0.5rem; }
  .ingredient-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.87rem; padding: 0.25rem 0; border-bottom: 1px solid var(--border); }
  .ingredient-row:last-child { border-bottom: none; }
  .ing-name { color: var(--text); }
  .ing-qty { font-size: 0.8rem; white-space: nowrap; }
  .ing-have { color: var(--green); }
  .ing-need { color: var(--red); }

  .card-footer-row { display: flex; justify-content: space-between; align-items: center; padding: 0.6rem 1rem; border-top: 1px solid var(--border); background: var(--bg-card); }
  .craftable-count { color: var(--gold); font-weight: 600; font-size: 0.85rem; }
  .codex-link { font-size: 0.78rem; color: var(--gold); text-decoration: none; opacity: 0.7; }
  .codex-link:hover { opacity: 1; text-decoration: underline; }

  .empty-state { text-align: center; padding: 3rem; color: var(--text-dim); font-style: italic; }

  /* ── LOADING ── */
  .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(10,8,6,0.85); z-index: 100; align-items: center; justify-content: center; flex-direction: column; gap: 1.5rem; }
  body.light .loading-overlay { background: rgba(245,240,232,0.88); }
  .loading-overlay.visible { display: flex; }
  .spinner { width: 50px; height: 50px; border: 3px solid var(--border-gold); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-family: 'Cinzel', serif; color: var(--gold); font-size: 1rem; letter-spacing: 0.1em; text-align: center; }
  .loading-sub { color: var(--text-dim); font-size: 0.9rem; font-style: italic; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-deep); }
  ::-webkit-scrollbar-thumb { background: var(--border-gold); border-radius: 3px; }

  @media (max-width: 700px) {
    .preview-section.visible { grid-template-columns: 1fr; }
    .recipe-grid { grid-template-columns: 1fr; }
    h1 { font-size: 1.4rem; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo-line">
      <svg width="32" height="32" viewBox="0 0 36 36" fill="none">
        <polygon points="18,2 34,10 34,26 18,34 2,26 2,10" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
        <circle cx="18" cy="18" r="5" fill="#c9a84c" opacity="0.3"/>
        <circle cx="18" cy="18" r="2" fill="#c9a84c"/>
      </svg>
      <h1 id="main-title">BDO Depo Analizi</h1>
    </div>
    <p class="subtitle" id="main-subtitle">Depo ekran görüntüsü yükle — gerçek BDO Codex tarifleri ile analiz et</p>
    <div class="header-controls">
      <button class="lang-btn active" id="lang-tr" onclick="setLang('tr')">🇹🇷 Türkçe</button>
      <button class="lang-btn" id="lang-en" onclick="setLang('en')">🇺🇸 English</button>
      <div class="divider-btn"></div>
      <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">Aydınlık</button>
    </div>
  </header>

  <div class="upload-zone" id="upload-zone">
    <span class="upload-icon">📦</span>
    <h2 id="upload-title">Depo Ekran Görüntüsü Yükle</h2>
    <p id="upload-desc">Tıkla veya sürükle bırak · PNG, JPG desteklenir</p>
    <input type="file" id="file-input" accept="image/*">
  </div>

  <div class="preview-section" id="preview-section">
    <div class="preview-card">
      <img id="preview-img" src="" alt="Depo">
      <div class="card-footer">
        <button class="btn btn-secondary" id="change-btn">↩ Değiştir</button>
        <button class="btn btn-primary" id="analyze-btn">⚔ Analiz Et</button>
      </div>
    </div>
    <div class="ai-panel">
      <div class="ai-panel-title">
        <div class="status-dot" id="status-dot"></div>
        <span id="ai-panel-title-text">Durum</span>
      </div>
      <div class="ai-status-text" id="status-text">Analiz etmek için butona bas.</div>
      <div id="items-container" style="display:none;">
        <div style="font-size:0.8rem;color:var(--text-dim);margin-bottom:0.5rem;text-transform:uppercase;letter-spacing:0.08em;" id="detected-label">Tespit Edilen Malzemeler</div>
        <div class="items-grid" id="items-grid"></div>
      </div>
    </div>
  </div>

  <div id="results-section">
    <div class="results-header" id="results-header">⚗ Gerçek BDO Tarifleri — BDO Codex</div>
    <div class="results-tabs">
      <button class="tab active" id="tab-culinary-btn" onclick="switchTab('culinary',this)">🍲 Aşçılık</button>
      <button class="tab" id="tab-alchemy-btn" onclick="switchTab('alchemy',this)">⚗ Kimya</button>
    </div>
    <div id="tab-culinary" class="tab-content active"><div class="recipe-grid" id="culinary-grid"></div></div>
    <div id="tab-alchemy"  class="tab-content">       <div class="recipe-grid" id="alchemy-grid"></div> </div>
  </div>
</div>

<div class="loading-overlay" id="loading-overlay">
  <div class="spinner"></div>
  <div style="text-align:center;">
    <div class="loading-text" id="loading-text">Yükleniyor</div>
    <div class="loading-sub"  id="loading-sub">Lütfen bekleyin...</div>
  </div>
</div>

<script>
const PROXY_URL   = 'https://bdo-api-proxy.onurcilhoroz.workers.dev/';
const CODEX_PROXY = 'https://bdo-api-proxy.onurcilhoroz.workers.dev/codex';
const ICON_BASE   = 'https://bdocodex.com/items/';

// ── STRINGS ───────────────────────────────────────────────────────────────
const S = {
  tr: {
    title:         'BDO Depo Analizi',
    subtitle:      'Depo ekran görüntüsü yükle — gerçek BDO Codex tarifleri ile analiz et',
    uploadTitle:   'Depo Ekran Görüntüsü Yükle',
    uploadDesc:    'Tıkla veya sürükle bırak · PNG, JPG desteklenir',
    changeBtn:     '↩ Değiştir',
    analyzeBtn:    '⚔ Analiz Et',
    aiPanel:       'Durum',
    detectedLabel: 'Tespit Edilen Malzemeler',
    statusReady:   'Analiz etmek için butona bas.',
    statusReading: 'Malzemeler okunuyor...',
    statusSearch:  'BDO Codex\'ten gerçek tarifler aranıyor...',
    statusDone:    n => `✓ ${n} malzeme bulundu, tarifler listeleniyor.`,
    statusErr:     'Hata: ',
    resultsHeader: '⚗ Gerçek BDO Tarifleri — BDO Codex',
    tabCulinary:   '🍲 Aşçılık',
    tabAlchemy:    '⚗ Kimya',
    loadRead:      'Malzemeler Okunuyor',
    loadReadSub:   'Yapay zeka deponu analiz ediyor...',
    loadCodex:     'BDO Codex Sorgulanıyor',
    loadCodexSub:  'Gerçek tarifler getiriliyor...',
    emptyCulinary: 'Bu malzemelerle eşleşen aşçılık tarifi bulunamadı.',
    emptyAlchemy:  'Bu malzemelerle eşleşen kimya tarifi bulunamadı.',
    craftable:     n => `${n}× üretilebilir`,
    noMats:        'Eksik malzeme var',
    codexLink:     '→ Codex\'te Gör',
    need:          'gerekli',
    themeLight:    'Aydınlık',
    themeDark:     'Karanlık',
    imagePrompt: `Bu Black Desert Online depo ekran görüntüsündeki craft malzemelerini listele.
DAHİL ET: hammaddeler (tahıl, et, balık, sebze, maden, odun, bitki, kan, deri), işlenmiş malzemeler, kimya/aşçılık bileşenleri, tohumlar.
HARİÇ TUT: silah, zırh, aksesuar, iksir, hazır yemek, kara taş, binek, ekipman.
MİKTAR KURALI: B veya b = bin (297B = 297000, 103B = 103000). M = milyon. Sadece tam sayı yaz.
Sadece JSON döndür, başka hiçbir şey yazma:
{"items":[{"name":"Pirinç","qty":297000},{"name":"Buğday","qty":385}]}`
  },
  en: {
    title:         'BDO Storage Analyzer',
    subtitle:      'Upload storage screenshot — analyze with real BDO Codex recipes',
    uploadTitle:   'Upload Storage Screenshot',
    uploadDesc:    'Click or drag & drop · PNG, JPG supported',
    changeBtn:     '↩ Change',
    analyzeBtn:    '⚔ Analyze',
    aiPanel:       'Status',
    detectedLabel: 'Detected Materials',
    statusReady:   'Press the button to analyze.',
    statusReading: 'Reading materials...',
    statusSearch:  'Fetching real recipes from BDO Codex...',
    statusDone:    n => `✓ ${n} materials found, listing recipes.`,
    statusErr:     'Error: ',
    resultsHeader: '⚗ Real BDO Recipes — BDO Codex',
    tabCulinary:   '🍲 Cooking',
    tabAlchemy:    '⚗ Alchemy',
    loadRead:      'Reading Storage',
    loadReadSub:   'AI is scanning your storage...',
    loadCodex:     'Querying BDO Codex',
    loadCodexSub:  'Fetching real recipes...',
    emptyCulinary: 'No matching cooking recipes found for your materials.',
    emptyAlchemy:  'No matching alchemy recipes found for your materials.',
    craftable:     n => `${n}× craftable`,
    noMats:        'Missing materials',
    codexLink:     '→ View on Codex',
    need:          'needed',
    themeLight:    'Light Mode',
    themeDark:     'Dark Mode',
    imagePrompt: `List the craft materials from this Black Desert Online storage screenshot.
INCLUDE: raw materials (grain, meat, fish, vegetables, ore, timber, plants, blood, hide), processed materials, cooking/alchemy ingredients, seeds.
EXCLUDE: weapons, armor, accessories, potions, ready food, black stones, mounts, equipment.
QUANTITY RULE: B or b = thousands (297B = 297000, 103B = 103000). M = millions. Write full integer only.
Return ONLY JSON, nothing else:
{"items":[{"name":"Wheat","qty":297000},{"name":"Corn","qty":385}]}`
  }
};

// ── STATE ─────────────────────────────────────────────────────────────────
let lang      = localStorage.getItem('bdo_lang')  || 'tr';
let isDark    = localStorage.getItem('bdo_theme') !== 'light';
let inventory = [];
let currentBase64 = null;
let mediaType = 'image/jpeg';

// ── THEME ─────────────────────────────────────────────────────────────────
function applyTheme() {
  document.body.classList.toggle('light', !isDark);
  document.getElementById('theme-btn').textContent = isDark ? S[lang].themeLight : S[lang].themeDark;
}

function toggleTheme() {
  isDark = !isDark;
  localStorage.setItem('bdo_theme', isDark ? 'dark' : 'light');
  applyTheme();
}

// ── LANGUAGE ──────────────────────────────────────────────────────────────
function setLang(l) {
  lang = l;
  localStorage.setItem('bdo_lang', l);
  document.getElementById('lang-tr').classList.toggle('active', l === 'tr');
  document.getElementById('lang-en').classList.toggle('active', l === 'en');
  applyStrings();
  // Re-render results if visible (so cards also get translated)
  if (document.getElementById('results-section').classList.contains('visible') && inventory.length) {
    rerenderResults();
  }
}

function applyStrings() {
  const s = S[lang];
  document.getElementById('main-title').textContent          = s.title;
  document.getElementById('main-subtitle').textContent       = s.subtitle;
  document.getElementById('upload-title').textContent        = s.uploadTitle;
  document.getElementById('upload-desc').textContent         = s.uploadDesc;
  document.getElementById('change-btn').textContent          = s.changeBtn;
  document.getElementById('analyze-btn').textContent         = s.analyzeBtn;
  document.getElementById('ai-panel-title-text').textContent = s.aiPanel;
  document.getElementById('detected-label').textContent      = s.detectedLabel;
  document.getElementById('results-header').textContent      = s.resultsHeader;
  document.getElementById('tab-culinary-btn').textContent    = s.tabCulinary;
  document.getElementById('tab-alchemy-btn').textContent     = s.tabAlchemy;
  document.getElementById('theme-btn').textContent           = isDark ? s.themeLight : s.themeDark;
  document.title = s.title;
  if (!currentBase64) setStatus('', s.statusReady);
}

// ── UI HELPERS ────────────────────────────────────────────────────────────
function setStatus(state, text) {
  document.getElementById('status-dot').className    = 'status-dot ' + state;
  document.getElementById('status-text').textContent = text;
}
function showLoading(t, s) {
  document.getElementById('loading-text').textContent = t;
  document.getElementById('loading-sub').textContent  = s;
  document.getElementById('loading-overlay').classList.add('visible');
}
function hideLoading() { document.getElementById('loading-overlay').classList.remove('visible'); }

function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

// ── UPLOAD ────────────────────────────────────────────────────────────────
const zone   = document.getElementById('upload-zone');
const fInput = document.getElementById('file-input');

zone.addEventListener('click', () => fInput.click());
zone.addEventListener('dragover',  e => { e.preventDefault(); zone.classList.add('drag-over'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('drag-over'); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
fInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

document.getElementById('change-btn').addEventListener('click', () => {
  document.getElementById('preview-section').classList.remove('visible');
  document.getElementById('results-section').classList.remove('visible');
  inventory = []; currentBase64 = null; fInput.value = '';
  cachedCulinary = []; cachedAlchemy = [];
  setStatus('', S[lang].statusReady);
});

function handleFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const maxW = 1200;
      let w = img.width, h = img.height;
      if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const resized = canvas.toDataURL('image/jpeg', 0.85);
      currentBase64 = resized.split(',')[1];
      mediaType = 'image/jpeg';
      document.getElementById('preview-img').src = resized;
      document.getElementById('preview-section').classList.add('visible');
      document.getElementById('items-container').style.display = 'none';
      document.getElementById('results-section').classList.remove('visible');
      setStatus('', S[lang].statusReady);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ── STEP 1: AI reads image ────────────────────────────────────────────────
async function readInventory() {
  const resp = await fetch(PROXY_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 4000,
      messages: [{ role: 'user', content: [
        { type: 'image', source: { type: 'base64', media_type: mediaType, data: currentBase64 } },
        { type: 'text', text: S[lang].imagePrompt }
      ]}]
    })
  });
  const data = await resp.json();
  if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
  const text  = data.content.map(b => b.text || '').join('');
  const match = text.replace(/```json|```/g,'').trim().match(/\{[\s\S]*\}/);
  if (!match) throw new Error(lang === 'tr' ? 'AI malzeme listesi döndürmedi' : 'AI returned no item list');
  return JSON.parse(match[0]);
}

// ── STEP 2: Fetch real Codex recipes ─────────────────────────────────────
async function fetchCodexRecipes(type) {
  const l    = lang === 'tr' ? 'tr' : 'us';
  const resp = await fetch(`${CODEX_PROXY}?type=${type}&l=${l}&o=0&s=500`);
  if (!resp.ok) throw new Error('BDO Codex ' + resp.status);
  const data = await resp.json();
  return data.aaData || data.data || [];
}

// ── STEP 3: Parse Codex row ───────────────────────────────────────────────
function parseCodexRow(row) {
  // row format: [id, icon_html, name_html, type, skill, exp, ingredients_html, weight, output_html, ingredient_ids_json, ...]
  if (!Array.isArray(row) || row.length < 10) return null;

  const id = row[0];

  // Extract recipe name from HTML - name is in row[2]
  const nameHtml = typeof row[2] === 'string' ? row[2] : (typeof row[1] === 'string' ? row[1] : '');
  const name = (nameHtml.match(/<b>(.*?)<\/b>/) || [])[1] || `Recipe ${id}`;

  // Extract ingredient IDs from JSON string e.g. "[9018,9065,7313,9017]"
  const idStr = row[9] || '[]';

  // Extract ingredient quantities from HTML
  const ingHtml  = row[5] || '';

  // Extract icon from output HTML
  const outHtml  = row[7] || '';

  const skillObj   = row[3] || {};
  const skillLevel = typeof skillObj === 'object' ? (skillObj.display || '') : String(skillObj);

  let ingredientIds = [];
  try { ingredientIds = JSON.parse(idStr); } catch(e) {}
  const quantities = [...ingHtml.matchAll(/quantity_small nowrap[^>]*>(\d+)/g)].map(m => parseInt(m[1]));
  const iconMatch  = outHtml.match(/src="\/items\/([^"]+)"/);
  const icon       = iconMatch ? iconMatch[1] : '';

  return { id, name, icon, skillLevel, ingredientIds, quantities };
}

// ── STEP 4: Match recipes to inventory ───────────────────────────────────
function matchRecipes(recipes, inv) {
  // Build TWO lookups: by name (tr & en, lowercase) AND by item id if possible
  const nameMap = {};
  inv.forEach(i => {
    nameMap[i.name.toLowerCase().trim()] = i.qty;
  });

  const out = [];

  for (const row of recipes) {
    const r = parseCodexRow(row);
    if (!r || !r.ingredientIds.length) continue;

    let canCraft = Infinity;
    let hasAny   = false;
    const parsed = [];

    r.ingredientIds.forEach((itemId, idx) => {
      const reqQty = r.quantities[idx] || 1;

      // Get item name from lookup table (both tr and en)
      const names  = ITEM_NAMES[itemId];
      const trName = names ? names[0] : null;
      const enName = names ? names[1] : null;

      // Try to find in inventory by tr name, en name, or ID
      let have = 0;
      if (trName) have = nameMap[trName.toLowerCase()] || 0;
      if (!have && enName) have = nameMap[enName.toLowerCase()] || 0;
      // Fuzzy: check if any inv item contains the name
      if (!have && trName) {
        const key = Object.keys(nameMap).find(k => k.includes(trName.toLowerCase()) || trName.toLowerCase().includes(k));
        if (key) have = nameMap[key];
      }

      const displayName = lang === 'tr' ? (trName || `Item ${itemId}`) : (enName || `Item ${itemId}`);
      if (have > 0) hasAny = true;
      const possible = have >= reqQty ? Math.floor(have / reqQty) : 0;
      if (possible < canCraft) canCraft = possible;
      parsed.push({ name: displayName, required: reqQty, have });
    });

    if (!hasAny || !parsed.length) continue;

    out.push({
      id:          r.id,
      name:        r.name,
      icon:        r.icon,
      skillLevel:  r.skillLevel,
      ingredients: parsed,
      craftable:   canCraft === Infinity ? 0 : canCraft,
      hasAll:      canCraft > 0
    });
  }

  return out.sort((a, b) => {
    if (a.hasAll !== b.hasAll) return a.hasAll ? -1 : 1;
    return b.craftable - a.craftable;
  });
}

// ── RENDER ────────────────────────────────────────────────────────────────
let cachedCulinary = [];
let cachedAlchemy  = [];

function renderItems(items) {
  document.getElementById('items-grid').innerHTML = items.map(i =>
    `<div class="item-tag">${i.name} <span class="qty">×${i.qty.toLocaleString()}</span></div>`
  ).join('');
  document.getElementById('items-container').style.display = 'block';
}

function renderCard(r) {
  const s    = S[lang];
  const cl   = lang === 'tr' ? 'tr' : 'us';
  const href = r.id ? `https://bdocodex.com/${cl}/recipe/${r.id}/` : '#';
  const iconHtml = r.icon ? `<img class="recipe-icon" src="${ICON_BASE}${r.icon}" alt="" onerror="this.style.display='none'">` : '';
  const badge = r.hasAll
    ? `<span class="craft-badge craft-yes">${s.craftable(r.craftable)}</span>`
    : `<span class="craft-badge craft-no">${s.noMats}</span>`;

  const rows = r.ingredients.map(i => {
    const cls = i.have === 0 ? 'ing-need' : i.have >= i.required ? 'ing-have' : 'ing-need';
    return `<div class="ingredient-row">
      <span class="ing-name">${i.name}</span>
      <span class="ing-qty ${cls}">${i.have.toLocaleString()} / ${i.required} ${s.need}</span>
    </div>`;
  }).join('');

  return `<div class="recipe-card">
    <div class="recipe-card-header">${iconHtml}<div class="recipe-name">${r.name}</div>${badge}</div>
    <div class="recipe-card-body">
      ${r.skillLevel ? `<div class="skill-level">${r.skillLevel}</div>` : ''}
      <div>${rows}</div>
    </div>
    <div class="card-footer-row">
      <span class="craftable-count">${r.hasAll ? s.craftable(r.craftable) : s.noMats}</span>
      <a class="codex-link" href="${href}" target="_blank">${s.codexLink}</a>
    </div>
  </div>`;
}

function renderGrid(id, recipes, emptyMsg) {
  document.getElementById(id).innerHTML = recipes.length
    ? recipes.map(renderCard).join('')
    : `<div class="empty-state">${emptyMsg}</div>`;
}

function rerenderResults() {
  const s = S[lang];
  renderGrid('culinary-grid', cachedCulinary, s.emptyCulinary);
  renderGrid('alchemy-grid',  cachedAlchemy,  s.emptyAlchemy);
  // Update header & tabs
  document.getElementById('results-header').textContent     = s.resultsHeader;
  document.getElementById('tab-culinary-btn').textContent   = s.tabCulinary;
  document.getElementById('tab-alchemy-btn').textContent    = s.tabAlchemy;
}

// ── MAIN ──────────────────────────────────────────────────────────────────
document.getElementById('analyze-btn').addEventListener('click', async () => {
  if (!currentBase64) return;
  const s = S[lang];
  try {
    showLoading(s.loadRead, s.loadReadSub);
    setStatus('reading', s.statusReading);

    const res = await readInventory();
    inventory = res.items || [];
    renderItems(inventory);
    setStatus('reading', s.statusSearch);

    showLoading(s.loadCodex, s.loadCodexSub);
    const [culRaw, alcRaw] = await Promise.all([
      fetchCodexRecipes('culinary'),
      fetchCodexRecipes('alchemy')
    ]);

    cachedCulinary = matchRecipes(culRaw, inventory);
    cachedAlchemy  = matchRecipes(alcRaw, inventory);

    hideLoading();
    setStatus('done', s.statusDone(inventory.length));
    renderGrid('culinary-grid', cachedCulinary, s.emptyCulinary);
    renderGrid('alchemy-grid',  cachedAlchemy,  s.emptyAlchemy);
    document.getElementById('results-section').classList.add('visible');
    document.getElementById('results-section').scrollIntoView({ behavior: 'smooth' });

  } catch (err) {
    hideLoading();
    setStatus('error', s.statusErr + err.message);
    console.error(err);
  }
});

document.getElementById('lang-en').classList.toggle('active', lang === 'en');
