<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDO Storage Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0c0a09;
            color: #d6d3d1;
            font-family: 'Marcellus', serif;
        }
        .bdo-gold { color: #c4a46a; }
        .bdo-border { border-color: #3f3f46; }
        .bdo-bg-dark { background-color: #1c1917; }
        .upload-area {
            border: 2px dashed #3f3f46;
            transition: all 0.3s ease;
        }
        .upload-area:hover {
            border-color: #c4a46a;
            background-color: #171717;
        }
        .item-card {
            background: linear-gradient(145deg, #1c1917, #0c0a09);
            border-left: 3px solid #c4a46a;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10">

    <div class="max-w-5xl mx-auto">
        <header class="text-center mb-12">
            <div class="flex justify-center mb-4">
                <div class="w-12 h-12 border-2 border-yellow-600 rotate-45 flex items-center justify-center">
                    <div class="w-2 h-2 bg-yellow-600 rounded-full"></div>
                </div>
            </div>
            <h1 class="text-4xl md:text-5xl font-light tracking-widest bdo-gold uppercase mb-2">BDO Storage Analyzer</h1>
            <p class="italic text-slate-500">Upload your storage — find the most profitable option</p>
            
            <div class="flex justify-center gap-4 mt-6">
                <button class="px-6 py-1 border bdo-border text-xs uppercase hover:bg-zinc-800 transition">TR Türkçe</button>
                <button class="px-6 py-1 border border-yellow-600 text-xs uppercase bg-yellow-900/20 bdo-gold">US English</button>
            </div>
        </header>

        <hr class="bdo-border opacity-30 mb-12">

        <div class="grid grid-cols-1 gap-8">
            
            <div id="dropZone" class="upload-area rounded-lg p-12 text-center cursor-pointer relative">
                <input type="file" id="imageInput" class="hidden" accept="image/*">
                <div id="previewContainer" class="hidden mb-4 flex justify-center">
                    <img id="imagePreview" src="" class="max-h-64 rounded border border-zinc-700 shadow-2xl">
                </div>
                <div id="uploadUI">
                    <div class="flex justify-center mb-4">
                        <svg class="w-12 h-12 text-zinc-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <h2 class="text-xl bdo-gold mb-1 uppercase tracking-wider">Upload Storage Screenshot</h2>
                    <p class="text-zinc-500 text-sm italic">Click or drag & drop · PNG, JPG supported</p>
                </div>
            </div>

            <button id="analyzeBtn" class="bg-zinc-800 hover:bg-zinc-700 text-zinc-300 py-4 px-8 rounded border border-zinc-600 uppercase tracking-widest text-sm transition-all disabled:opacity-50">
                Analizi Başlat
            </button>

            <div id="status" class="text-center text-sm italic text-zinc-500 min-h-[20px]"></div>

            <div id="resultsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mt-8">
                </div>

        </div>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const dropZone = document.getElementById('dropZone');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const resultsGrid = document.getElementById('resultsGrid');
        const status = document.getElementById('status');

        // Worker URL'ni buraya yapıştır (Görseldeki Cloudflare URL'si)
        const WORKER_URL = "https://bdo-api-proxy.onurcilhoroz.workers.dev"; 

        // Drag & Drop İşlemleri
        dropZone.onclick = () => imageInput.click();
        imageInput.onchange = (e) => handleFile(e.target.files[0]);

        function handleFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('imagePreview').src = e.target.result;
                document.getElementById('previewContainer').classList.remove('hidden');
                document.getElementById('uploadUI').classList.add('hidden');
            };
            reader.readAsDataURL(file);
        }

        async function analyzeInventory() {
            const file = imageInput.files[0];
            if (!file) return alert("Lütfen önce bir görsel yükleyin.");

            status.textContent = "Veri tabanı yükleniyor ve resim işleniyor...";
            analyzeBtn.disabled = true;
            resultsGrid.innerHTML = "";

            try {
                // 1. bdo_items.json yükle
                const dbRes = await fetch('bdo_items.json');
                const dbData = await dbRes.json();
                const itemDb = dbData.id_to_info;

                // 2. Resmi Base64'e çevir
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = async () => {
                    const base64Image = reader.result.split(',')[1];

                    // 3. Worker Üzerinden Claude'a Gönder
                    status.textContent = "Yapay zeka envanteri okuyor...";
                    const response = await fetch(WORKER_URL, {
                        method: 'POST',
                        body: JSON.stringify({ image: base64Image })
                    });

                    const data = await response.json();
                    // Claude'un JSON çıktısını temizle
                    const aiItems = JSON.parse(data.content[0].text.match(/\[.*\]/s)[0]);

                    // 4. Eşleştirme ve Görselleştirme
                    aiItems.forEach(item => {
                        const entry = Object.entries(itemDb).find(([id, info]) => 
                            info.name_en.toLowerCase() === item.name.toLowerCase()
                        );

                        const card = document.createElement('div');
                        card.className = "item-card p-4 flex items-center gap-4";

                        const icon = entry ? `https://bdocodex.com${entry[1].icon}` : 'https://via.placeholder.com/48/27272a/c4a46a?text=?';
                        const name = entry ? entry[1].name_tr : item.name;
                        const id = entry ? entry[0] : '???';

                        card.innerHTML = `
                            <img src="${icon}" class="w-12 h-12 border border-zinc-700 bg-zinc-900 shadow-inner">
                            <div class="flex-1">
                                <div class="text-[10px] uppercase text-zinc-500 tracking-tighter">ID: ${id}</div>
                                <div class="text-sm font-medium bdo-gold">${name}</div>
                                <div class="text-xs text-zinc-400 font-mono">${item.count.toLocaleString()} adet</div>
                            </div>
                        `;
                        resultsGrid.appendChild(card);
                    });

                    status.textContent = "Analiz başarıyla tamamlandı.";
                    analyzeBtn.disabled = false;
                };
            } catch (error) {
                console.error(error);
                status.textContent = "Bir hata oluştu. Bağlantıyı veya JSON dosyasını kontrol et.";
                analyzeBtn.disabled = false;
            }
        }

        analyzeBtn.addEventListener('click', analyzeInventory);
    </script>
</body>
</html>
