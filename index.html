<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>BDO Storage Analyzer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Pro&display=swap');
  :root { --gold: #c9a84c; --bg: #0a0806; --panel: #12100c; --text: #d4c9a8; --border: #3d3020; }
  body { background: var(--bg); color: var(--text); font-family: 'Crimson Pro', serif; margin: 0; padding: 20px; }
  .container { max-width: 1100px; margin: 0 auto; }
  header { text-align: center; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 30px; }
  h1 { font-family: 'Cinzel', serif; color: var(--gold); margin: 0; }
  .upload-box { border: 2px dashed var(--border); padding: 40px; text-align: center; background: var(--panel); cursor: pointer; transition: 0.3s; }
  .upload-box:hover { border-color: var(--gold); }
  .main-layout { display: none; grid-template-columns: 350px 1fr; gap: 25px; margin-top: 20px; }
  .visible { display: grid; }
  .item-card { background: #1a1610; border: 1px solid #2e2618; padding: 12px; display: flex; align-items: center; gap: 15px; margin-bottom: 8px; border-left: 4px solid var(--gold); }
  .item-icon { width: 48px; height: 48px; border: 1px solid var(--border); background: #000; }
  .btn { background: linear-gradient(to bottom, var(--gold), #8a6a1e); color: #000; border: none; padding: 12px; cursor: pointer; font-family: 'Cinzel'; font-weight: bold; width: 100%; text-transform: uppercase; }
  #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 999; align-items: center; justify-content: center; color: var(--gold); font-family: 'Cinzel'; flex-direction: column; }
  .items-scroll { max-height: 600px; overflow-y: auto; padding-right: 10px; }
</style>
</head>
<body>

<div class="container">
  <header><h1>BDO STORAGE ANALYZER</h1></header>

  <div class="upload-box" id="drop-zone">
    <div style="font-size: 40px;">📦</div>
    <h3>Depo Ekran Görüntüsü Yükle</h3>
    <p>PNG veya JPG sürükle veya tıkla</p>
    <input type="file" id="file-input" hidden accept="image/*">
  </div>

  <div class="main-layout" id="app-wrap">
    <div>
      <img id="img-preview" style="width:100%; border: 1px solid var(--gold); margin-bottom: 15px;">
      <button class="btn" id="analyze-btn">⚔ ANALİZİ BAŞLAT</button>
      <button class="btn" style="margin-top:10px; background: #222; color: #888;" onclick="location.reload()">↩ YENİ RESİM</button>
    </div>
    <div>
      <h3 style="font-family:'Cinzel'; color:var(--gold); border-bottom:1px solid var(--border); padding-bottom:10px;">TESPİT EDİLENLER</h3>
      <div class="items-scroll" id="results"></div>
    </div>
  </div>
</div>

<div id="overlay">
  <div style="width: 50px; height: 50px; border: 4px solid #3d3020; border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite;"></div>
  <p style="margin-top: 20px; letter-spacing: 3px;">KARA RUH OKUYOR...</p>
</div>

<style> @keyframes spin { to { transform: rotate(360deg); } } </style>

<script>
const WORKER_URL = 'https://bdo-api-proxy.onurcilhoroz.workers.dev/'; // Kendi URL'in
let ITEM_DB = null;

// Yerel Veritabanını Yükle
fetch('bdo_items.json').then(r => r.json()).then(data => { 
  ITEM_DB = data; 
  console.log("Eşya veritabanı hazır."); 
});

const fInput = document.getElementById('file-input');
const dZone = document.getElementById('drop-zone');

dZone.onclick = () => fInput.click();
fInput.onchange = (e) => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    document.getElementById('img-preview').src = ev.target.result;
    document.getElementById('app-wrap').classList.add('visible');
    dZone.style.display = 'none';
  };
  reader.readAsDataURL(file);
};

document.getElementById('analyze-btn').onclick = async () => {
  const imgData = document.getElementById('img-preview').src.split(',')[1];
  document.getElementById('overlay').style.display = 'flex';
  const resDiv = document.getElementById('results');
  resDiv.innerHTML = "";

  try {
    const response = await fetch(WORKER_URL, {
      method: 'POST',
      body: JSON.stringify({ image: imgData })
    });
    const result = await response.json();

    if (result.error) throw new Error(result.error);
    if (!result.text) throw new Error("Yapay zeka yanıt veremedi.");

    // JSON Ayıklama ve Temizleme
    const cleanText = result.text.replace(/```json/g, "").replace(/```/g, "").trim();
    const jsonMatch = cleanText.match(/\[[\s\S]*\]/s);
    
    if (!jsonMatch) throw new Error("Liste formatı bulunamadı. Yanıt: " + cleanText.substring(0, 50));
    
    const items = JSON.parse(jsonMatch[0]);

    items.forEach(item => {
      // JSON Veritabanında (name_en) eşleştirme
      const entry = ITEM_DB ? Object.entries(ITEM_DB.id_to_info).find(([id, info]) => 
        info.name_en.toLowerCase() === item.name.toLowerCase()
      ) : null;

      const card = document.createElement('div');
      card.className = 'item-card';
      const icon = entry ? `https://bdocodex.com${entry[1].icon}` : 'https://bdocodex.com/items/new_icon/03_etc/00007001.png';
      const trName = entry ? (entry[1].name_tr || entry[1].name_en) : item.name;

      card.innerHTML = `
        <img src="${icon}" class="item-icon" onerror="this.src='https://via.placeholder.com/48?text=?'">
        <div>
          <div style="font-weight:700; color:#fff; font-size:1.1rem;">${trName}</div>
          <div style="color:var(--gold); font-family:'Cinzel';">${item.count.toLocaleString()} ADET</div>
        </div>
      `;
      resDiv.appendChild(card);
    });

  } catch (err) {
    alert("Hata: " + err.message);
    console.error(err);
  } finally {
    document.getElementById('overlay').style.display = 'none';
  }
};
</script>
</body>
</html>
